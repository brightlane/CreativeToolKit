name: Daily Blog Generator

on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull request to the main branch

jobs:
  generate-blog:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner image

    steps:
      # Step to set up Python 3.9 (you can change the version if needed)
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Specify the version of Python you are using

      # Step to check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Optional: Skip this if you don’t have dependencies
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt  # Remove this line if not needed

      # Step to run your blog generation script (change the filename if necessary)
      - name: Generate blog posts
        run: |
          python generate_blog.py  # Replace this with your actual script name

      # Step to upload generated files (replace with your actual path if necessary)
      - name: Upload generated blog posts
        uses: actions/upload-artifact@v4  # Make sure you're using the latest version (v4)
        with:
          name: generated-blogs
          path: ./generated_blogs/  # Adjust this path based on where your generated blog posts are saved
