name: Daily Blog Generator

# Trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches:
      - main  # Trigger on push to the main branch
  pull_request:
    branches:
      - main  # Trigger on pull request to the main branch

jobs:
  generate-blog:
    runs-on: ubuntu-latest  # Set the runner OS (Ubuntu)

    steps:
      # Step to set up Python version 3.9
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # You can change the version if needed

      # Step to check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Skip installing dependencies if not needed
      # - name: Install dependencies
      #   run: |
      #     python -m pip install --upgrade pip
      #     pip install -r requirements.txt  # Commented out if no dependencies needed

      # Step to run the blog generation script (or any Python script you want to run)
      - name: Generate blog posts
        run: |
          python generate_blog.py  # Replace with your actual script name

      # Upload generated blog posts or other output
      - name: Upload generated blog posts
        uses: actions/upload-artifact@v4  # Updated to v4 to fix the deprecation issue
        with:
          name: generated-blogs
          path: ./generated_blogs/  # Adjust this path based on where your output is located
