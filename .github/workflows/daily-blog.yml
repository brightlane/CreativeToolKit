name: Daily Blog Generator

on:
  schedule:
    - cron: "0 8 * * *"   # every day at 8 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Generate Blog
      run: python daily-generator.py

    - name: Commit & Push
      run: |
        git config --global user.name "seo-bot"
        git config --global user.email "bot@users.noreply.github.com"
        git add .
        git commit -m "Daily blog update" || echo "No changes"
        git push
