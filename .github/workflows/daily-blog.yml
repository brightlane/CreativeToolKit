name: Daily Blog Generator

# Trigger the workflow on push or pull request events to the main branch
on:
  push:
    branches:
      - main  # or any other branch you want to trigger the action
  pull_request:
    branches:
      - main  # or any other branch you want to trigger the action

jobs:
  generate-blog:
    runs-on: ubuntu-latest  # Set the runner OS (Ubuntu)

    steps:
      # Step to set up Python version 3.9
      - name: Set up Python 3.9
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'  # Updated to a supported version

      # Step to check out the code from the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Install dependencies (if any)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Adjust this line if you're using other dependencies

      # Step to run the blog generation script (or any Python script you want to run)
      - name: Generate blog posts
        run: |
          python generate_blog.py  # Replace with your script name

      # Optional: Save artifacts or log output
      - name: Upload generated blog posts
        uses: actions/upload-artifact@v3
        with:
          name: generated-blogs
          path: ./generated_blogs/  # Adjust this path based on your output directory
